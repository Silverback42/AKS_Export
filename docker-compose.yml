services:
  backend:
    image: ghcr.io/silverback42/aks-export-backend:latest
    container_name: aks-export-backend
    restart: unless-stopped
    volumes:
      - /volume1/docker/aks-export/data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/aks_export.db
      - DATA_DIR=/app/data
      - CORS_ORIGINS=["http://localhost:8083"]

  frontend:
    image: ghcr.io/silverback42/aks-export-frontend:latest
    container_name: aks-export-frontend
    restart: unless-stopped
    ports:
      - "8083:80"
    depends_on:
      - backend
